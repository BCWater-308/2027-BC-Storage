<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" style="background:#fafaf7;font-family:'Inter',ui-sans-serif,system-ui;width:100%;height:auto;display:block;">
<text x="380.0" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1612">How big is the deficit, relative to total fresh groundwater in storage?</text>
<text x="380.0" y="40" text-anchor="middle" font-size="11" fill="#5b5547" font-style="italic">Vina Subbasin total fresh GW in storage: ~16 MAF (Vina Subbasin GSP (Dec 15, 2021), p. ES-5)</text>
<rect x="50" y="80" width="660" height="32" fill="#e6f0e8" stroke="#5b5547" stroke-width="0.7"/>
<rect x="50" y="80" width="6.01" height="32" fill="#a32d2d"/>
<text x="380.0" y="74" text-anchor="middle" font-size="11" fill="#5b5547">Full-scale view (sliver = deficit)</text>
<text x="380.0" y="130" text-anchor="middle" font-size="12" fill="#1a1612">WY 2025 cumulative deficit = <tspan font-weight="700" fill="#a32d2d">0.91%</tspan> of 16 MAF</text>
<rect x="50" y="180" width="660" height="32" fill="#e6f0e8" stroke="#5b5547" stroke-width="0.7"/>
<rect x="50" y="180" width="294.49" height="32" fill="#c75a35" fill-opacity="0.5" stroke="#a32d2d" stroke-width="0.5"/>
<rect x="50" y="180" width="150.29" height="32" fill="#a32d2d"/>
<text x="380.0" y="174" text-anchor="middle" font-size="11" fill="#5b5547">25× zoom (showing 0.64 MAF of the 16 MAF total)</text>
<text x="380.0" y="230" text-anchor="middle" font-size="12" fill="#1a1612">WY 2022 trough = <tspan font-weight="700" fill="#a32d2d">1.78%</tspan> of 16 MAF (285,567 AF deepest deficit)</text>
</svg>